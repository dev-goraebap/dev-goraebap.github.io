<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — dev.goraebap</title>
<style>
	:root { --bg: #f5f2eb; --text: #1a1a1a; --tertiary: #6b7280; --accent: #2563eb; }
	@media (prefers-color-scheme: dark) {
		:root { --bg: #18181b; --text: #f4f4f5; --tertiary: #71717a; --accent: #60a5fa; }
		img { filter: invert(1) hue-rotate(180deg); }
	}
	* { margin: 0; padding: 0; box-sizing: border-box; }
	body {
		min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
		background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
		text-align: center; padding: 1rem;
	}
	img { width: 192px; height: 192px; object-fit: contain; margin-bottom: 2rem; user-select: none; }
	.code { font-size: 3.75rem; font-weight: 300; color: var(--tertiary); margin-bottom: 0.5rem; }
	.title { font-size: 1.125rem; color: var(--text); margin-bottom: 0.25rem; }
	.desc { font-size: 0.875rem; color: var(--tertiary); margin-bottom: 2rem; }
	a {
		display: inline-flex; align-items: center; gap: 0.5rem;
		padding: 0.625rem 1.25rem; border-radius: 9999px; font-size: 0.875rem;
		color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent);
		text-decoration: none; transition: background 150ms;
	}
	a:hover { background: color-mix(in srgb, var(--accent) 18%, transparent); }
</style>
</head>
<body>
	<img src="/error.svg" alt="" draggable="false" aria-hidden="true" />
	<p class="code">404</p>
	<p class="title">페이지를 찾을 수 없습니다</p>
	<p class="desc">요청하신 페이지가 존재하지 않거나 이동되었어요</p>
	<a href="/">
		<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
		홈으로 돌아가기
	</a>
</body>
</html>
