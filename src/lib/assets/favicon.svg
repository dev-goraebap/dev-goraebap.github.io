<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1e293b"/>

  <!-- Whale body -->
  <ellipse cx="28" cy="35" rx="20" ry="13"
           fill="none" stroke="#EDE8DF" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Upper tail fluke -->
  <path d="M46 30 Q52 22 56 18"
        fill="none" stroke="#EDE8DF" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Lower tail fluke -->
  <path d="M46 40 Q52 48 56 50"
        fill="none" stroke="#EDE8DF" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Tail notch (concave curve between flukes) -->
  <path d="M46 30 Q50 35 46 40"
        fill="none" stroke="#EDE8DF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Spout (blowhole water spray) -->
  <path d="M18 22 Q16 14 18 8"
        fill="none" stroke="#EDE8DF" stroke-width="2" stroke-linecap="round"/>
  <path d="M23 21 Q23 14 25 8"
        fill="none" stroke="#EDE8DF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Eye -->
  <circle cx="17" cy="33" r="2.5" fill="#EDE8DF"/>
</svg>
